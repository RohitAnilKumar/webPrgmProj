<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — QuizHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1><a href="home.html">Quiz<span class="logo-accent">Hub</span></a></h1>
        <div class="nav-actions">
            <a href="signup.html">Sign Up</a>
            <a href="login.html" class="btn-primary" style="padding: 8px 20px;">Login</a>
        </div>
    </header>
    <main>
<div class="container">
    <h2>Create Your Account</h2>
    <p style="color: var(--text-light); margin-bottom: 24px;">Join QuizHub and start testing your knowledge today.</p>
    <form onsubmit="handle_signup(event)">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Choose a username" required>
            <div id="username-error" class="error-message"></div>
            <div class="form-hint">At least 3 characters</div>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
            <div id="email-error" class="error-message"></div>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create a strong password" required>
            <div id="password-error" class="error-message"></div>
            <div class="form-hint">Minimum 6 characters</div>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; padding: 14px; font-size: 1.05rem;">Create Account</button>
    </form>
    <div class="login-link">
        <p>Already have an account? <a href="login.html">Login</a></p>
    </div>
</div>
</main>
    <footer>
        <p>&copy; 2026 QuizHub. Built as a Student Project.</p>
    </footer>
<script src="index.js"></script>
</body>
</html>
